<!DOCTYPE html>
<html>
<head>
    <title>PACHEDU Manager</title>
</head>
<script>
setInterval(() => {
    fetch("/queue")
    .then(res => res.text())
    .then(html => {
        document.getElementById("queue").innerHTML = html;
    });
}, 3000);
</script>
<body>

{% if login %}

<h2>Manager Login</h2>

<form action="/login" method="post">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<p style="color:red;">{{ error }}</p>

{% else %}

<h2>Queue Dashboard</h2>

<form action="/add" method="post">
    <input name="reg" placeholder="Vehicle Reg" required>

    <select name="service">
        {% for s in services %}
        <option>{{ s }}</option>
        {% endfor %}
    </select>

    <select name="vehicle">
        {% for v in vehicles %}
        <option>{{ v }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Car</button>
</form>

<hr>
<h2>Current Queue</h2>

<div id="queue">
    {% include "queue.html" %}
</div>

</ul>

{% endif %}

</body>
</html>
