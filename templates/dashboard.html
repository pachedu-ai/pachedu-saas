<!DOCTYPE html>
<html>
<head>
    <title>PACHEDU Manager</title>
</head>

<body>

{% if login %}

<h2>Manager Login</h2>

<form action="/login" method="post">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<p style="color:red;">{{ error }}</p>

{% else %}

<h2>Queue Dashboard</h2>

<form action="/add" method="post">
    <input name="reg" placeholder="Vehicle Reg" required>

    <select name="service">
        {% for s in services %}
        <option>{{ s }}</option>
        {% endfor %}
    </select>

    <select name="vehicle">
        {% for v in vehicles %}
        <option>{{ v }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Car</button>
</form>

<hr>

<h3>Current Queue</h3>

<ul>
{% for car in queue %}
<li>
{{ car.reg }} —
{{ car.service }} —
{{ car.vehicle }} —
{{ car.time }} min —
R{{ car.price }}
</li>
{% endfor %}
</ul>

{% endif %}

</body>
</html>
